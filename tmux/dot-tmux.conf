
set -g status-style 'bg=#333333 fg=#5eacd3'

# Enable extended key reporting so apps can distinguish modified keys like Shift/Ctrl/Alt+Enter.
set -g extended-keys on
set -g extended-keys-format csi-u
set -g base-index 1 # such that windows start at 1 for ergonomics when direct switching

bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy -in -selection clipboard'

# vim-like pane switching
bind -r ^ last-window
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

bind-key -r f run-shell "tmux new-window ~/.local/bin/tmux-sessionizer"

# Open new panes in the current pane's working directory instead of the
# directory where the tmux session was started.
bind '"' split-window -c '#{pane_current_path}'
bind '%' split-window -h -c '#{pane_current_path}'

# Faster escape sequences (default is 500ms).
# This helps when exiting insert mode in Vim: http://superuser.com/a/252717/65504
set -s escape-time 50

# Bigger scrollback buffer
set -g history-limit 10000

# Neovim says it needs this
set-option -g focus-events on

# Clear pane completion tint when focusing into a pane.
# tmux 3.6 removed `select-pane -P`; use pane-local `window-style` instead.
# In hook commands, `set-option -t` does not expand `#{pane_id}` and can emit
# "No such pane #{pane_id}"; omit `-t` so tmux uses the pane that just focused.
set-hook -g pane-focus-in 'set-option -p @rang 0 ; set-option -p window-style default'


# Style status bar
#set -g status-style fg=white,bg=black
#set -g window-status-current-style fg=green,bg=black
#set -g pane-active-border-style fg=green,bg=black
# Make the focused pane stand out: purple active border, dim inactive borders,
# and heavier border glyphs for better visibility.
set -g pane-active-border-style fg=#a855f7
set -g pane-border-style fg=#444444
# Add a subtle warm tint to the focused pane so focus is visible even where
# tmux cannot draw an outside border.
set -g window-active-style bg=#2a2618
set -g window-style default
set -g pane-border-lines heavy
# Keep tmux's standard active-pane border indicator behavior.
set -g pane-border-indicators colour
set -g window-status-format " #I:#W#F "
set -g window-status-current-format " #I:#W#F "
# Make inactive window labels slightly darker than the selected window.
set -g window-status-style fg=#4f96ba,bg=#242424
set -g window-status-current-style fg=#5eacd3,bg=#333333
#set -g window-status-current-style bg=green,fg=black
#set -g window-status-activity-style bg=black,fg=yellow
set -g window-status-separator ""
set -g status-justify centre
set -g monitor-activity on
set -g visual-activity on

# Handle bells inside tmux instead of letting the outer terminal/Pi render them.
# Flash the ringing window by briefly reversing its colors, then restore the
# normal focused-pane tint.
set -g visual-bell on
# Use hook_window inside run-shell so tmux expands the hook's window ID before
# running targetted commands. Passing #{window_id} directly to set-option -t can
# be interpreted literally and show "No such window #{window_id}" when a bell
# is triggered (for example by shell completion on Tab).
set-hook -g alert-bell 'run-shell -b "w=\"#{hook_window}\"; tmux set-option -w -t \"$w\" window-active-style reverse 2>/dev/null; tmux set-option -w -t \"$w\" window-style reverse 2>/dev/null; sleep 0.12; tmux set-option -w -t \"$w\" window-active-style bg=#2a2618 2>/dev/null; tmux set-option -w -t \"$w\" window-style default 2>/dev/null"'



# Enable mouse support so clicks focus panes, and scrolling/selection can use the mouse.
set -g mouse on
# Some terminals/apps can consume pane-click events; make pane selection explicit
# while still forwarding the click to mouse-aware programs.
bind-key -n MouseDown1Pane select-pane -t= \; send-keys -M
# Clicking directly on a split border does not count as a pane click in tmux,
# which can make mouse focus feel inconsistent. Treat border clicks as focus
# clicks too; dragging borders still resizes via tmux's default MouseDrag1Border.
bind-key -n MouseDown1Border select-pane -t=

