
set -g status-style 'bg=#333333 fg=#5eacd3'

# Enable extended key reporting so apps can distinguish modified keys like Shift/Ctrl/Alt+Enter.
set -g extended-keys on
set -g extended-keys-format csi-u
set -g base-index 1 # such that windows start at 1 for ergonomics when direct switching

bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy -in -selection clipboard'

# vim-like pane switching
bind -r ^ last-window
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

# Vim-style pane navigation without prefix: Alt+h/j/k/l
# At the far left/right pane edge, move to the previous/next window.
# Do not wrap from the first window to the last, or from the last to the first.
bind-key -n M-h if -F '#{pane_at_left}' 'if -F "#{?window_start_flag,,1}" "previous-window"' 'select-pane -L'
bind-key -n M-j select-pane -D
bind-key -n M-k select-pane -U
bind-key -n M-l if -F '#{pane_at_right}' 'if -F "#{?window_end_flag,,1}" "next-window"' 'select-pane -R'

bind-key -r f run-shell "tmux new-window ~/.local/bin/tmux-sessionizer"

# Open new panes in the current pane's working directory instead of the
# directory where the tmux session was started.
bind '"' split-window -c '#{pane_current_path}'
bind '%' split-window -h -c '#{pane_current_path}'

# Faster escape sequences (default is 500ms).
# This helps when exiting insert mode in Vim: http://superuser.com/a/252717/65504
set -s escape-time 50

# Bigger scrollback buffer
set -g history-limit 10000

# Neovim says it needs this
set-option -g focus-events on

# Clear pane completion tint when focusing into a pane.
# tmux 3.6 removed `select-pane -P`; use pane-local `window-style` instead.
# In hook commands, `set-option -t` does not expand `#{pane_id}` and can emit
# "No such pane #{pane_id}"; omit `-t` so tmux uses the pane that just focused.
set-hook -g pane-focus-in 'set-option -p @rang 0 ; set-option -p window-style default'


# Style status bar
# Use a 2-line status area so tmux messages/prompts appear on a narrow line
# above the tab bar instead of covering the tab bar itself.
set -g status 2
set -g message-line 0
set -g status-format[0] ''
set -g status-format[1] '#[align=left range=left #{E:status-left-style}]#[push-default]#{T;=/#{status-left-length}:status-left}#[pop-default]#[norange default]#[list=on align=#{status-justify}]#[list=left-marker]<#[list=right-marker]>#[list=on]#{W:#[range=window|#{window_index} #{E:window-status-style}#{?#{&&:#{window_last_flag},#{!=:#{E:window-status-last-style},default}}, #{E:window-status-last-style},}#{?#{&&:#{window_bell_flag},#{!=:#{E:window-status-bell-style},default}}, #{E:window-status-bell-style},#{?#{&&:#{||:#{window_activity_flag},#{window_silence_flag}},#{!=:#{E:window-status-activity-style},default}}, #{E:window-status-activity-style},}}]#[push-default]#{T:window-status-format}#[pop-default]#[norange default]#{?loop_last_flag,,#{window-status-separator}},#[range=window|#{window_index} #{?#{!=:#{E:window-status-current-style},default},#{E:window-status-current-style},#{E:window-status-style}}#{?#{&&:#{window_last_flag},#{!=:#{E:window-status-last-style},default}}, #{E:window-status-last-style},}#{?#{&&:#{window_bell_flag},#{!=:#{E:window-status-bell-style},default}}, #{E:window-status-bell-style},#{?#{&&:#{||:#{window_activity_flag},#{window_silence_flag}},#{!=:#{E:window-status-activity-style},default}}, #{E:window-status-activity-style},}}]#[push-default]#{T:window-status-current-format}#[pop-default]#[norange list=on default]#{?loop_last_flag,,#{window-status-separator}}}#[nolist align=right range=right #{E:status-right-style}]#[push-default]#{T;=/#{status-right-length}:status-right}#[pop-default]#[norange default]'
#set -g status-style fg=white,bg=black
#set -g window-status-current-style fg=green,bg=black
#set -g pane-active-border-style fg=green,bg=black
# Make the focused pane stand out: purple active border, dim inactive borders,
# and heavier border glyphs for better visibility.
set -g pane-active-border-style fg=#a855f7
set -g pane-border-style fg=#444444
# Keep the focused pane's warm tint subtle, and make non-focused panes more
# visibly discolored/dimmed so the active pane stands out.
set -g window-active-style bg=#2a2618
set -g window-style bg=#7E8291
set -g pane-border-lines heavy
# Keep tmux's standard active-pane border indicator behavior.
set -g pane-border-indicators colour
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "
# Make inactive window labels slightly darker than the selected window.
set -g window-status-style fg=#4f96ba,bg=#242424
set -g window-status-current-style fg=#111111,bg=#f97316
#set -g window-status-current-style bg=green,fg=black
#set -g window-status-activity-style bg=black,fg=yellow
set -g window-status-separator ""
# Keep the window list anchored so tab positions do not move when focus changes;
# the selected tab is indicated only by color via window-status-current-style.
set -g status-justify left
set -g monitor-activity on
set -g visual-activity on

# Handle bells inside tmux instead of letting the outer terminal/Pi render them.
# Flash the ringing window by briefly reversing its colors, then restore the
# normal focused-pane tint.
set -g visual-bell on
# Use hook_window inside run-shell so tmux expands the hook's window ID before
# running targetted commands. Passing #{window_id} directly to set-option -t can
# be interpreted literally and show "No such window #{window_id}" when a bell
# is triggered (for example by shell completion on Tab).
set-hook -g alert-bell 'run-shell -b "w=\"#{hook_window}\"; tmux set-option -w -t \"$w\" window-active-style reverse 2>/dev/null; tmux set-option -w -t \"$w\" window-style reverse 2>/dev/null; sleep 0.12; tmux set-option -w -t \"$w\" window-active-style bg=#2a2618 2>/dev/null; tmux set-option -w -t \"$w\" window-style bg=#7E8291 2>/dev/null"'



# Enable mouse support so clicks focus panes, and scrolling/selection can use the mouse.
set -g mouse on
# Some terminals/apps can consume pane-click events; make pane selection explicit
# while still forwarding the click to mouse-aware programs.
bind-key -n MouseDown1Pane select-pane -t= \; send-keys -M
# Clicking directly on a split border does not count as a pane click in tmux,
# which can make mouse focus feel inconsistent. Treat border clicks as focus
# clicks too; dragging borders still resizes via tmux's default MouseDrag1Border.
bind-key -n MouseDown1Border select-pane -t=

